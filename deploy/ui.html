<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASMS — Micro-Model Tester</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --yellow: #d29922; --red: #f85149;
    --purple: #bc8cff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Mono', monospace; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

  /* Header */
  header { display: flex; align-items: center; gap: 16px; padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--surface); }
  header h1 { font-size: 14px; font-weight: 600; white-space: nowrap; }
  header h1 span { color: var(--muted); font-weight: 400; }
  .model-select { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .model-select label { font-size: 12px; color: var(--muted); }
  .model-select select { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 12px; font-family: inherit; cursor: pointer; }
  .model-select select:focus { outline: none; border-color: var(--accent); }
  .status { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .status.disconnected { background: var(--red); }
  .model-info { font-size: 11px; color: var(--muted); }

  /* Context bar */
  .context-bar { display: flex; gap: 8px; padding: 8px 20px; border-bottom: 1px solid var(--border); background: var(--surface); }
  .context-bar input { flex: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 12px; font-family: inherit; }
  .context-bar input:focus { outline: none; border-color: var(--accent); }
  .context-bar input::placeholder { color: var(--muted); }

  /* Chat area */
  .chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .msg { max-width: 85%; display: flex; flex-direction: column; gap: 6px; }
  .msg.user { align-self: flex-end; }
  .msg.assistant { align-self: flex-start; }
  .msg .bubble { padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
  .msg.user .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .msg.assistant .bubble { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

  /* ASMS metadata panel */
  .asms-meta { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 11px; display: flex; flex-direction: column; gap: 6px; }
  .asms-meta .row { display: flex; align-items: center; gap: 8px; }
  .asms-meta .label { color: var(--muted); min-width: 80px; }
  .asms-meta .value { color: var(--text); }
  .asms-meta .tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; }
  .tag.green { background: rgba(63,185,80,0.15); color: var(--green); }
  .tag.yellow { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .tag.red { background: rgba(248,81,73,0.15); color: var(--red); }
  .tag.purple { background: rgba(188,140,255,0.15); color: var(--purple); }
  .tool-calls { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 8px; font-size: 11px; overflow-x: auto; white-space: pre; color: var(--accent); }

  /* Input area */
  .input-area { padding: 12px 20px; border-top: 1px solid var(--border); background: var(--surface); display: flex; gap: 8px; }
  .input-area textarea { flex: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; font-size: 13px; font-family: inherit; resize: none; height: 44px; line-height: 1.5; }
  .input-area textarea:focus { outline: none; border-color: var(--accent); }
  .input-area textarea::placeholder { color: var(--muted); }
  .input-area button { background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 0 20px; font-size: 13px; font-family: inherit; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .input-area button:hover { filter: brightness(1.1); }
  .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="status" id="status"></div>
  <h1>ASMS <span>Micro-Model Tester</span></h1>
  <div class="model-info" id="modelInfo">--</div>
  <button id="mcpBtn" onclick="connectMcp()" style="background:var(--bg);color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:11px;font-family:inherit;cursor:pointer;white-space:nowrap;">Connect MCP</button>
  <div class="model-select">
    <label>Checkpoint:</label>
    <select id="modelSelect"></select>
  </div>
</header>

<div class="context-bar">
  <input id="userId" type="text" placeholder="userId (e.g. usr_001)" value="usr_001">
  <input id="cycleId" type="text" placeholder="cycleId (e.g. cyc_q2_2026)" value="cyc_q2_2026">
  <input id="cycleName" type="text" placeholder="cycleName (e.g. Q2 2026)" value="Q2 2026">
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
  <label style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);cursor:pointer;white-space:nowrap;">
    <input type="checkbox" id="liveToggle"> <span id="liveLabel">Dry run</span>
  </label>
  <textarea id="input" placeholder="Ask the OKR agent..." rows="1"></textarea>
  <button id="send" onclick="sendMessage()">Send</button>
</div>

<script>
const BASE = window.location.origin;
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const liveToggle = document.getElementById('liveToggle');
const liveLabel = document.getElementById('liveLabel');

liveToggle.addEventListener('change', () => {
  liveLabel.textContent = liveToggle.checked ? 'Live MCP' : 'Dry run';
  liveLabel.style.color = liveToggle.checked ? 'var(--green)' : 'var(--muted)';
});
const status = document.getElementById('status');
const modelInfo = document.getElementById('modelInfo');
const modelSelect = document.getElementById('modelSelect');

let currentModel = 'okr-micro-asms';

// Auto-resize textarea
input.addEventListener('input', () => {
  input.style.height = '44px';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

// Enter to send, Shift+Enter for newline
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

async function checkHealth() {
  try {
    const r = await fetch(BASE + '/health');
    const d = await r.json();
    status.className = 'status';
    return true;
  } catch {
    status.className = 'status disconnected';
    return false;
  }
}

async function loadModels() {
  try {
    const r = await fetch(BASE + '/v1/models');
    const d = await r.json();
    modelSelect.innerHTML = '';
    for (const m of d.data) {
      const opt = document.createElement('option');
      opt.value = m.id;
      opt.textContent = m.id;
      modelSelect.appendChild(opt);
      if (m.meta) {
        const params = m.meta.params ? (m.meta.params / 1e6).toFixed(1) + 'M' : '?';
        const q = m.meta.quantized ? 'INT4' : 'FP16';
        modelInfo.textContent = `${params} params | ${q} | MLX`;
      }
    }

    // Also load checkpoints list
    try {
      const cr = await fetch(BASE + '/v1/asms/checkpoints');
      const cd = await cr.json();
      modelSelect.innerHTML = '';
      for (const cp of cd.checkpoints) {
        const opt = document.createElement('option');
        opt.value = cp.path;
        opt.textContent = cp.name + (cp.active ? ' (active)' : '');
        opt.selected = cp.active;
        modelSelect.appendChild(opt);
      }
    } catch {}
  } catch {
    modelInfo.textContent = 'disconnected';
  }
}

modelSelect.addEventListener('change', async () => {
  const cp = modelSelect.value;
  try {
    const r = await fetch(BASE + '/v1/asms/switch', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({checkpoint: cp})
    });
    const d = await r.json();
    if (d.status === 'ok') {
      addSystemMsg(`Switched to ${d.model} (${d.params} params)`);
      modelInfo.textContent = `${(d.params/1e6).toFixed(1)}M params | MLX`;
    } else {
      addSystemMsg(`Switch failed: ${d.error}`);
    }
  } catch (e) {
    addSystemMsg(`Switch failed: ${e.message}`);
  }
});

function getSessionContext() {
  return {
    userId: document.getElementById('userId').value || 'usr_001',
    activeCycleId: document.getElementById('cycleId').value || 'cyc_q2_2026',
    activeCycleName: document.getElementById('cycleName').value || 'Q2 2026',
  };
}

function addMsg(role, content) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = content;
  div.appendChild(bubble);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function addSystemMsg(text) {
  const div = document.createElement('div');
  div.style.cssText = 'text-align:center;font-size:11px;color:var(--muted);padding:4px;';
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addAsmsPanel(msgDiv, asms) {
  const panel = document.createElement('div');
  panel.className = 'asms-meta';

  // Workflow
  const wf = asms.workflow || 'unknown';
  panel.innerHTML += `<div class="row"><span class="label">Workflow</span><span class="tag purple">${wf}</span></div>`;

  // Confidence
  const conf = asms.confidence || 0;
  const confClass = conf >= 0.85 ? 'green' : conf >= 0.5 ? 'yellow' : 'red';
  panel.innerHTML += `<div class="row"><span class="label">Confidence</span><span class="tag ${confClass}">${(conf*100).toFixed(0)}%</span></div>`;

  // Latency
  panel.innerHTML += `<div class="row"><span class="label">Latency</span><span class="value">${asms.latency_ms}ms</span></div>`;

  // Tool calls
  if (asms.tool_calls && asms.tool_calls.length > 0) {
    panel.innerHTML += `<div class="row"><span class="label">Tool calls</span></div>`;
    const tc = document.createElement('div');
    tc.className = 'tool-calls';
    tc.textContent = JSON.stringify(asms.tool_calls, null, 2);
    panel.appendChild(tc);
  }

  // MCP results
  if (asms.mcp_results && asms.mcp_results.length > 0) {
    const modeTag = `<span class="tag green">LIVE</span>`;
    panel.innerHTML += `<div class="row"><span class="label">MCP</span>${modeTag}</div>`;
    const mc = document.createElement('div');
    mc.className = 'tool-calls';
    mc.style.borderColor = 'var(--green)';
    mc.textContent = JSON.stringify(asms.mcp_results, null, 2);
    panel.appendChild(mc);
  } else if (asms.live_mode === false) {
    panel.innerHTML += `<div class="row"><span class="label">MCP</span><span class="tag yellow">DRY RUN</span></div>`;
  }

  // Methodology
  if (asms.methodology_notes && Object.keys(asms.methodology_notes).length > 0) {
    panel.innerHTML += `<div class="row"><span class="label">Methodology</span><span class="value">${JSON.stringify(asms.methodology_notes)}</span></div>`;
  }

  msgDiv.appendChild(panel);
}

async function sendMessage() {
  const query = input.value.trim();
  if (!query) return;

  input.value = '';
  input.style.height = '44px';
  sendBtn.disabled = true;

  addMsg('user', query);
  const ctx = getSessionContext();

  try {
    const r = await fetch(BASE + '/v1/chat/completions', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: currentModel,
        messages: [
          {role: 'system', content: JSON.stringify(ctx)},
          {role: 'user', content: query},
        ],
        temperature: 0.1,
        asms_live: liveToggle.checked,
      }),
    });

    const d = await r.json();
    const choice = d.choices?.[0];
    const content = choice?.message?.content || 'No response';
    const msgDiv = addMsg('assistant', content);

    // Show ASMS metadata
    if (d.asms) {
      addAsmsPanel(msgDiv, d.asms);
    }
  } catch (e) {
    addMsg('assistant', `Error: ${e.message}`);
  }

  sendBtn.disabled = false;
  input.focus();
}

// Starter prompts
function addStarters() {
  const starters = [
    'I want to improve customer retention by 20% this quarter',
    'Show me my OKRs',
    'We hit 75% on the NPS key result, update the score',
    'Health check on the engineering team',
    'Onboard Sarah as a data scientist on the platform team',
    'Align my goals with the company objectives',
  ];
  const div = document.createElement('div');
  div.style.cssText = 'display:flex;flex-wrap:wrap;gap:8px;padding:20px;justify-content:center;';
  for (const s of starters) {
    const btn = document.createElement('button');
    btn.textContent = s;
    btn.style.cssText = 'background:var(--surface);color:var(--muted);border:1px solid var(--border);border-radius:16px;padding:6px 14px;font-size:12px;font-family:inherit;cursor:pointer;';
    btn.onmouseenter = () => btn.style.borderColor = 'var(--accent)';
    btn.onmouseleave = () => btn.style.borderColor = 'var(--border)';
    btn.onclick = () => { input.value = s; sendMessage(); div.remove(); };
    div.appendChild(btn);
  }
  chat.appendChild(div);
}

async function connectMcp() {
  const btn = document.getElementById('mcpBtn');
  btn.textContent = 'Connecting...';
  btn.style.color = 'var(--yellow)';
  try {
    const r = await fetch(BASE + '/v1/asms/connect', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: '{}'});
    const d = await r.json();
    if (d.status === 'connected') {
      btn.textContent = 'MCP Connected';
      btn.style.color = 'var(--green)';
      btn.style.borderColor = 'var(--green)';
      addSystemMsg('Connected to Keyflow MCP at ' + d.endpoint);
    } else {
      btn.textContent = 'Auth Needed';
      btn.style.color = 'var(--yellow)';
      btn.style.borderColor = 'var(--yellow)';
      addSystemMsg('OAuth required — check the terminal for the authorization URL, then click Connect MCP again');
    }
  } catch (e) {
    btn.textContent = 'MCP Error';
    btn.style.color = 'var(--red)';
    addSystemMsg('MCP connection failed: ' + e.message);
  }
}

// Init
checkHealth();
loadModels();
addStarters();
setInterval(checkHealth, 5000);
</script>
</body>
</html>
